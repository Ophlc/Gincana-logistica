<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Rota Zer013 - Resultado</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background-grid"></div>

<header>

  <div class="logo-container">

    <img src="rota013.png" alt="Logo Rota">

    <div class="hero-badge">
      Conferência Finalizada
    </div>

    <h1>RØTA ZER013</h1>

    <p class="subtitle">
      Resultado da Operação
    </p>

  </div>

</header>

<main>

  <section class="card full-section">

    <div class="section-tag">
      📊 RESULTADO
    </div>

    <h2>
      Resumo da Conferência
    </h2>

    <div id="res"></div>

    <button class="btn-primary" onclick="location.href='index.html'">
      Nova Operação
    </button>

  </section>

</main>

<footer>

  <div class="footer-logo">
    ⚓ Rota <span>Zer013</span>
  </div>

  <p>
    Sistema de Conferência de Livros
  </p>

</footer>

<script>
const dados=JSON.parse(localStorage.getItem('resultadoLivros')||'[]');
const tempo=localStorage.getItem('tempoFinal')||'00:00:00';
let html='<table><tr><th>Livro</th><th>Código</th><th>Caixa</th><th>Status</th></tr>';
let ac=0,er=0;
dados.forEach(d=>{
if(d.correto) ac++; else er++;
html+=`<tr class="${d.correto?'ok':'erro'}"><td>${d.nome}</td><td>${d.codigo}</td><td>${d.caixa}</td><td>${d.correto?'✅ Correto':'❌ Incorreto'}</td></tr>`;
});
html+='</table>';
html+=`<h2>Acertos: ${ac}</h2><h2>Erros: ${er}</h2><h2>Tempo Final: ${tempo}</h2>`;
document.getElementById('res').innerHTML=html;
</script>

</body>
</html>
